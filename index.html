<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✦ MONTHLY ENTERTAINMENT PRO ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nanum+Gothic:wght@400;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ff4d8d; --purple: #9b5de5; --gold: #ffd60a; --dark: #0d0d1a;
    --card: #16162a; --card2: #1e1e35; --text: #f0e6ff; --muted: #8888aa;
    --green: #00f5a0; --red: #ff4d4d; --blue: #4d9fff; --glass: rgba(255, 255, 255, 0.05);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--dark); color: var(--text); font-family: 'Nanum Gothic', sans-serif;
    min-height: 100vh; overflow-x: hidden;
  }
  header {
    text-align: center; padding: 20px 10px; position: sticky; top: 0; z-index: 100;
    background: rgba(13,13,26,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass);
  }
  header h1 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 4px; color: var(--pink); }
  
  nav {
    display: flex; justify-content: space-around; padding: 10px;
    background: var(--card); position: sticky; top: 70px; z-index: 90;
  }
  nav button {
    background: none; border: none; color: var(--muted); font-size: 11px;
    font-weight: 800; cursor: pointer; transition: 0.3s; padding: 5px;
  }
  nav button.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

  main { max-width: 600px; margin: 0 auto; padding: 15px; padding-bottom: 100px; }
  .section { display: none; }
  .section.active { display: block; }

  .card { background: var(--card); border: 1px solid var(--glass); border-radius: 20px; padding: 18px; margin-bottom: 15px; }
  .card-title { font-family: 'Black Han Sans', sans-serif; font-size: 14px; color: var(--gold); margin-bottom: 12px; display: block;}

  .item-row {
    background: var(--card2); border-radius: 12px; padding: 12px;
    display: flex; align-items: center; gap: 12px; margin-bottom: 10px; border: 1px solid transparent;
  }
  .item-row.selected { border-color: var(--pink); background: rgba(255, 77, 141, 0.1); }
  .focus-pill { font-size: 9px; padding: 3px 6px; border-radius: 4px; background: var(--purple); color: white; text-transform: uppercase; font-weight: 800;}
  
  .bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 5px; overflow: hidden; }
  .bar-fill { height: 100%; transition: width 0.5s; }
  
  .btn-action {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    font-family: 'Black Han Sans', sans-serif; font-size: 13px; cursor: pointer; margin-top: 10px;
  }
  .btn-pink { background: var(--pink); color: white; }
  .btn-outline { background: none; border: 1px solid var(--muted); color: var(--muted); }

  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: var(--card2); padding: 12px 24px; border-radius: 30px;
    font-size: 12px; border: 1px solid var(--pink); opacity: 0; transition: 0.3s; z-index: 1000;
  }
  #toast.show { opacity: 1; bottom: 50px; }

  .modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none;
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .modal-content { background: var(--card); padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid var(--glass); }
</style>
</head>
<body>

<header>
  <h1 id="agencyNameDisplay">NOVA ENTERTAINMENT</h1>
  <div style="font-size: 11px; color: var(--muted); margin-top: 5px;">
    💰 ₩<span id="statMoney">500,000</span> | 📅 Week <span id="statWeek">1</span>
  </div>
</header>

<nav>
  <button class="active" onclick="showTab('agency', this)">OFFICE</button>
  <button onclick="showTab('training', this)">TRAINING</button>
  <button onclick="showTab('groups', this)">GROUPS</button>
</nav>

<main>
  <section id="tab-agency" class="section active">
    <div class="card">
      <span class="card-title">RECRUITMENT</span>
      <p style="font-size: 12px; color: var(--muted); margin-bottom: 10px;">Find the next superstar to join your training center.</p>
      <button class="btn-action btn-pink" onclick="scoutTrainee()">SCOUT TRAINEE (₩50,000)</button>
    </div>

    <div class="card">
      <span class="card-title">AGENCY ACTIONS</span>
      <button class="btn-action btn-outline" onclick="runTask('media')">Viral Marketing (+Fans)</button>
    </div>

    <button class="btn-action btn-pink" style="padding: 20px; font-size: 16px; margin-top: 10px;" onclick="nextWeek()">NEXT WEEK ⏩</button>
  </section>

  <section id="tab-training" class="section">
    <div class="card">
      <span class="card-title">TRAINING CENTER</span>
      <p style="font-size: 11px; color: var(--muted); margin-bottom: 15px;">Focus areas grow automatically every week.</p>
      <div id="traineeList"></div>
    </div>
  </section>

  <section id="tab-groups" class="section">
    <div class="card">
      <span class="card-title">ACTIVE GROUPS</span>
      <div id="groupList"></div>
      <button class="btn-action btn-pink" onclick="openDebutModal()">DEBUT NEW GROUP</button>
    </div>
  </section>
</main>

<div id="debutModal" class="modal">
  <div class="modal-content">
    <span class="card-title">DEBUT SETTINGS</span>
    <input type="text" id="groupNameInput" placeholder="Group Name..." style="width:100%; padding:12px; border-radius:10px; background:var(--card2); border:1px solid var(--glass); color:white; margin-bottom:15px; outline:none;">
    <p style="font-size:11px; color:var(--muted); margin-bottom:10px;">Select trainees to debut:</p>
    <div id="debutSelectionList" style="max-height: 250px; overflow-y: auto; margin-bottom: 15px;"></div>
    <div style="display:flex; gap:10px;">
        <button class="btn-action btn-outline" onclick="closeModal()">CANCEL</button>
        <button class="btn-action btn-pink" onclick="confirmDebut()">DEBUT</button>
    </div>
  </div>
</div>

<div id="toast">Message</div>

<script>
// --- CORE GAME STATE ---
let G = {
  money: 500000,
  week: 1,
  trainees: [],
  groups: [],
  selectedForDebut: []
};

const NAMES = ["Jiwoo", "Taemin", "Soyeon", "Sunghoon", "Minji", "Hyunjin", "Nayeon", "Hoshi", "Karina", "Yeji"];
const FOCUS_TYPES = ['vocal', 'dance', 'rap', 'charm'];

// --- ACTIONS ---
function scoutTrainee() {
  if (G.money < 50000) return toast("Not enough money!");
  G.money -= 50000;
  
  let newTrainee = {
    id: Date.now() + Math.random(),
    name: NAMES[Math.floor(Math.random() * NAMES.length)],
    vocal: Math.floor(Math.random() * 20) + 5,
    dance: Math.floor(Math.random() * 20) + 5,
    readiness: 0,
    focus: 'vocal'
  };
  
  G.trainees.push(newTrainee);
  toast(`${newTrainee.name} has entered the basement!`);
  renderAll();
}

function nextWeek() {
  G.week++;
  
  // Trainee Progression
  G.trainees.forEach(t => {
    t[t.focus] += Math.floor(Math.random() * 3) + 2;
    t.readiness = Math.min(100, t.readiness + Math.floor(Math.random() * 7) + 4);
  });

  // Group Revenue
  G.groups.forEach(group => {
    let income = group.members.length * 20000;
    G.money += income;
  });

  saveGame();
  renderAll();
  toast(`Week ${G.week}: Weekly reports processed!`);
}

// --- MODAL & DEBUT ---
function openDebutModal() {
  if (G.trainees.length === 0) return toast("You have no trainees!");
  document.getElementById('debutModal').style.display = 'flex';
  G.selectedForDebut = [];
  renderDebutSelection();
}

function renderDebutSelection() {
  const list = document.getElementById('debutSelectionList');
  list.innerHTML = G.trainees.map(t => `
    <div class="item-row ${G.selectedForDebut.includes(t.id) ? 'selected' : ''}" onclick="toggleSelection(${t.id})">
      <div style="font-size:20px;">🎤</div>
      <div style="flex:1">
        <div style="font-weight:800; font-size:13px;">${t.name}</div>
        <div style="font-size:10px; color:var(--muted);">Ready: ${t.readiness}%</div>
      </div>
    </div>
  `).join('');
}

function toggleSelection(id) {
  if (G.selectedForDebut.includes(id)) {
    G.selectedForDebut = G.selectedForDebut.filter(x => x !== id);
  } else {
    G.selectedForDebut.push(id);
  }
  renderDebutSelection();
}

function confirmDebut() {
  const name = document.getElementById('groupNameInput').value || "Project X";
  if (G.selectedForDebut.length === 0) return toast("Select at least 1 trainee!");

  const members = G.trainees.filter(t => G.selectedForDebut.includes(t.id));
  G.groups.push({ 
    id: Date.now(), 
    name: name, 
    members: members, 
    debutWeek: G.week 
  });
  
  // Remove from training basement
  G.trainees = G.trainees.filter(t => !G.selectedForDebut.includes(t.id));
  
  closeModal();
  renderAll();
  toast(`${name} has officially debuted! 🎉`);
}

function closeModal() { 
    document.getElementById('debutModal').style.display = 'none'; 
    document.getElementById('groupNameInput').value = "";
}

// --- UI RENDERING ---
function renderAll() {
  document.getElementById('statMoney').innerText = G.money.toLocaleString();
  document.getElementById('statWeek').innerText = G.week;

  // Trainees
  const tList = document.getElementById('traineeList');
  tList.innerHTML = G.trainees.length ? G.trainees.map(t => `
    <div class="item-row">
      <div style="font-size:24px;">💫</div>
      <div style="flex:1">
        <div style="font-weight:800;">${t.name} <span class="focus-pill">${t.focus}</span></div>
        <div style="font-size:10px; color:var(--muted);">Debut Readiness: ${t.readiness}%</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${t.readiness}%; background:var(--green);"></div></div>
      </div>
      <button onclick="cycleFocus(${t.id})" style="background:none; border:1px solid var(--purple); color:var(--purple); padding:6px 12px; border-radius:8px; font-size:9px; font-weight:800;">CYCLE</button>
    </div>
  `).join('') : '<p style="text-align:center; color:var(--muted); padding:20px;">The basement is empty.</p>';

  // Groups
  const gList = document.getElementById('groupList');
  gList.innerHTML = G.groups.length ? G.groups.map(g => `
    <div class="card" style="background:var(--card2); border-left: 4px solid var(--pink);">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-family:'Black Han Sans'; color:var(--pink); font-size:16px;">${g.name}</span>
        <span style="font-size:9px; color:var(--muted); text-transform:uppercase;">Debut Week ${g.debutWeek}</span>
      </div>
      <div style="font-size:11px; margin-top:10px; color:var(--text); opacity:0.8;">
        Lineup: ${g.members.map(m=>m.name).join(' • ')}
      </div>
    </div>
  `).join('') : '<p style="text-align:center; color:var(--muted); padding:20px;">No groups have debuted yet.</p>';
}

function cycleFocus(id) {
  let t = G.trainees.find(x => x.id === id);
  let cur = FOCUS_TYPES.indexOf(t.focus);
  t.focus = FOCUS_TYPES[(cur + 1) % FOCUS_TYPES.length];
  renderAll();
}

function showTab(tabId, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tabId).classList.add('active');
  btn.classList.add('active');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function saveGame() { localStorage.setItem('me_pro_save', JSON.stringify(G)); }

// Start
const saved = localStorage.getItem('me_pro_save');
if(saved) G = JSON.parse(saved);
renderAll();
</script>
</body>
</html>
