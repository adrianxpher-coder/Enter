<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✦ MONTHLY ENTERTAINMENT ✦</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff4d8d">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3659/3659793.png">

<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nanum+Gothic:wght@400;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
  :root {
    --pink: #ff4d8d; --purple: #9b5de5; --gold: #ffd60a; --dark: #0d0d1a;
    --card: #16162a; --card2: #1e1e35; --text: #f0e6ff; --muted: #8888aa;
    --green: #00f5a0; --red: #ff4d4d; --blue: #4d9fff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark); color: var(--text); font-family: 'Nanum Gothic', sans-serif;
    min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
  }
  header { text-align: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 4px; color: var(--pink); }
  main { max-width: 600px; margin: 0 auto; padding: 20px; }
  .card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
  .btn { 
    width: 100%; padding: 15px; border-radius: 10px; border: none; 
    background: linear-gradient(135deg, var(--pink), var(--purple)); 
    color: white; font-family: 'Black Han Sans', sans-serif; cursor: pointer; 
  }
  #gameScreen { display: none; }
</style>
</head>
<body>

<div id="setupScreen">
  <header><h1>MONTHLY ENTERTAINMENT</h1></header>
  <main>
    <div class="card">
      <p style="margin-bottom: 15px; text-align: center;">Ready to debut your agency?</p>
      <button class="btn" onclick="startGame()">START GAME</button>
    </div>
  </main>
</div>

<div id="gameScreen">
  <header><h1 id="displayTitle">MY AGENCY</h1></header>
  <main>
    <div class="card">
      <p>Week: <span id="week">1</span></p>
      <p>Money: ₩<span id="money">500,000</span></p>
    </div>
    <button class="btn" onclick="nextWeek()">NEXT WEEK</button>
  </main>
</div>

<script>
  // PWA Register
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  let state = { week: 1, money: 500000 };

  function startGame() {
    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'block';
  }

  function nextWeek() {
    state.week++;
    state.money += 50000;
    document.getElementById('week').textContent = state.week;
    document.getElementById('money').textContent = state.money.toLocaleString();
  }
</script>

</body>
</html>
